<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cafetería POS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

.card-footer .btn { font-size: 0.7rem; padding: 2px 5px; }

@media print { .no-print { display: none; } }

</style>

</head>

<body class="bg-light">



<nav class="navbar navbar-dark bg-dark mb-4 no-print">

<div class="container-fluid">

<span class="navbar-brand mb-0 h1">☕ Cafetería POS</span>

<div>

<button class="btn btn-outline-info me-2" onclick="verReportes()">Ver Reportes</button>

<button class="btn btn-outline-warning me-2" data-bs-toggle="collapse" data-bs-target="#adminPanel">Gestión Inventario</button>

<button class="btn btn-danger" onclick="salir()">Salir</button>

</div>

</div>

</nav>



<div class="container no-print">

<div class="collapse mb-4" id="adminPanel">

<div class="card card-body shadow-sm">

<h5>Administración de Productos</h5>

<div class="d-flex gap-2">

<button class="btn btn-primary" onclick="crearProducto()">+ Agregar Nuevo Producto</button>

</div>

</div>

</div>



<div class="row">

<div class="col-md-7">

<div class="card p-3 shadow-sm">

<h5>Menú de Productos</h5>

<hr>

<div id="lista-productos" class="row"></div>

</div>

</div>



<div class="col-md-5">

<div class="card p-3 shadow-sm">

<h5>Orden Actual</h5>

<table class="table table-sm mt-3">

<thead>

<tr>

<th>Producto</th>

<th>Cant.</th>

<th>Subtotal</th>

<th></th>

</tr>

</thead>

<tbody id="carrito-body"></tbody>

</table>

<hr>

<div class="d-flex justify-content-between">

<h4>Total:</h4>

<h4 id="total-venta">$0.00</h4>

</div>

<button class="btn btn-success btn-lg w-100 mt-3" onclick="finalizarVenta()">

🛒 Pagar e Imprimir

</button>

</div>

</div>

</div>

</div>



<div class="modal fade" id="modalFactura" tabindex="-1">

<div class="modal-dialog modal-sm">

<div class="modal-content">

<div class="modal-header no-print">

<h5 class="modal-title">Factura de Venta</h5>

<button type="button" class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body" id="ticket-print"></div>

<div class="modal-footer no-print">

<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>

<button type="button" class="btn btn-primary" onclick="window.print()">Imprimir PDF</button>

</div>

</div>

</div>

</div>



<div class="modal fade" id="modalReportes" tabindex="-1">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">📊 Reportes de Ventas</h5>

<button type="button" class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<div class="row">

<div class="col-md-6">

<h6>Productos Más Vendidos</h6>

<ul id="lista-top-productos" class="list-group mb-3"></ul>

</div>

<div class="col-md-6">

<h6>Resumen del Día</h6>

<div class="card bg-light p-3">

<p>Ventas totales: <strong id="reporte-total-ventas">$0.00</strong></p>

<p>Alertas de Stock: <span id="reporte-stock-bajo" class="badge bg-danger">0</span></p>

</div>

</div>

</div>

</div>

</div>

</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="app.js"></script>

</body>

</html>
